// в”Җв”Җ Excel и§Јжһҗ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function parseWorkbook(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const range = XLSX.utils.decode_range(ws['!ref']);
  const maxRow = range.e.r + 1;
  const maxCol = range.e.c + 1;
  const result = {};
  const HEADER_ROW = 1; // 0-indexed = row 2

  const catCols = [];
  for (let c = 0; c < maxCol; c++) {
    const cell = ws[XLSX.utils.encode_cell({r: HEADER_ROW, c})];
    if (cell && cell.v && String(cell.v).trim()) {
      catCols.push({col: c, name: String(cell.v).trim()});
    }
  }

  catCols.forEach(({col, name}) => {
    const fullCol = col + 1;
    const entries = [];
    for (let r = HEADER_ROW + 1; r < maxRow; r++) {
      const abbrCell = ws[XLSX.utils.encode_cell({r, c: col})];
      const fullCell = ws[XLSX.utils.encode_cell({r, c: fullCol})];
      const abbr = abbrCell ? String(abbrCell.v).trim() : '';
      const full = fullCell ? String(fullCell.v).trim() : '';
      let zh = '';
      if (r + 1 < maxRow) {
        const na = ws[XLSX.utils.encode_cell({r: r+1, c: col})];
        const nf = ws[XLSX.utils.encode_cell({r: r+1, c: fullCol})];
        if ((!na || !String(na.v).trim()) && nf && String(nf.v).trim()) {
          zh = String(nf.v).trim();
        }
      }
      if (abbr) entries.push({abbr, full, zh});
    }
    if (entries.length) result[name] = entries;
  });
  return result;
}

function handleFile(file) {
  if (!file || !file.name.match(/\.xlsx?$/i)) {
    showToast('и«ӢдёҠеӮі .xlsx жҲ– .xls жӘ”жЎҲ', true); return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
      const newData = parseWorkbook(wb);
      const total = Object.values(newData).reduce((s, a) => s + a.length, 0);
      if (total === 0) throw new Error('empty');
      DATA = newData;
      activecat = null; query = ''; openEntries.clear();
      document.getElementById('search').value = '';
      document.getElementById('clear-btn').style.display = 'none';
      render();
      showToast('вң“ е·Іијүе…Ҙ ' + Object.keys(DATA).length + ' еҖӢеҲҶйЎһпјҢе…ұ ' + total + ' зӯҶзё®еҜ«');
    } catch (err) {
      showToast('и§ЈжһҗеӨұж•—пјҢи«ӢзўәиӘҚ Excel ж јејҸ', true);
    }
  };
  reader.readAsArrayBuffer(file);
}

  this.value = '';

function submitAdd() {
  const newCatVal = document.getElementById('add-newcat').value.trim();
  const selCat = document.getElementById('add-cat').value;
  const cat = newCatVal || selCat;
  const abbr = document.getElementById('add-abbr').value.trim();
  const full = document.getElementById('add-full').value.trim();
  const zh = document.getElementById('add-zh').value.trim();

  if (!cat) { showToast('и«ӢйҒёж“ҮжҲ–ијёе…ҘеҲҶйЎһ', true); return; }
  if (!abbr) { showToast('зё®еҜ«дёҚиғҪзӮәз©ә', true); return; }
  if (!full) { showToast('иӢұж–Үе…ЁзЁұдёҚиғҪзӮәз©ә', true); return; }

  if (!DATA[cat]) DATA[cat] = [];
  // Check duplicate
  const exists = DATA[cat].some(e => e.abbr.toLowerCase() === abbr.toLowerCase());
  if (exists) { showToast('жӯӨеҲҶйЎһе·ІжңүзӣёеҗҢзё®еҜ«', true); return; }

  DATA[cat].push({abbr, full, zh});
  closeAddModal();
  activecat = cat;
  query = '';
  document.getElementById('search').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  openEntries.clear();
  render();
  showToast('вң“ е·Іж–°еўһгҖҢ' + abbr + 'гҖҚеҲ° ' + cat);
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function renderCats() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  Object.entries(DATA).forEach(([cat, entries]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activecat === cat ? ' active' : '');
    btn.innerHTML = '<span>' + (CAT_LABELS[cat] || cat) + '</span><span class="count">' + entries.length + '</span>';
    btn.onclick = () => {
      activecat = (activecat === cat) ? null : cat;
      query = '';
      document.getElementById('search').value = '';
      document.getElementById('clear-btn').style.display = 'none';
      render();
    };
    grid.appendChild(btn);
  });
}

  const cats = activecat ? [activecat] : Object.keys(DATA);
  const sections = [];
  cats.forEach(cat => {
    let entries = DATA[cat];
    if (q) entries = entries.filter(e =>
      e.abbr.toLowerCase().includes(q) ||
      (e.full && e.full.toLowerCase().includes(q)) ||
      (e.zh && e.zh.toLowerCase().includes(q))
    );
    if (entries.length) sections.push({cat, entries});
  });

  if (!sections.length) {
    container.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa;">жүҫдёҚеҲ°з¬ҰеҗҲзҡ„е…§е®№</div>';
    return;
  }

  container.innerHTML = sections.map(({cat, entries}) => `
    <div class="section">
      <div class="section-header">${CAT_LABELS[cat] || cat}</div>
      <div class="entry-list">
        ${entries.map((e, i) => {
          const id = cat + '_' + i;
          const isOpen = openEntries.has(id);
          return `
            <div class="entry ${isOpen ? 'open' : ''}" data-id="${id}">
              <div class="entry-header" onclick="toggle('${id}')">
                <span class="abbr-tag">${hl(e.abbr, query)}</span>
                <span class="full-preview">${hl(e.full, query)}</span>
                <span class="chevron">в–¶</span>
              </div>
              <div class="entry-detail">
                <div class="detail-label">иӢұж–Үе…ЁзЁұ</div>
                <div class="detail-val">${hl(e.full, query)}</div>
                ${e.zh ? `<div class="detail-label">дёӯж–ҮиӘӘжҳҺ</div><div class="detail-val">${hl(e.zh, query)}</div>` : ''}
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function toggle(id) {
  if (openEntries.has(id)) openEntries.delete(id);
  else openEntries.add(id);
  render();
}

document.getElementById('search').addEventListener('input', function() {
  query = this.value;
  if (query) activecat = null;
  openEntries.clear();
  document.getElementById('clear-btn').style.display = query ? 'flex' : 'none';
  render();
});

document.getElementById('clear-btn').addEventListener('click', function() {
  document.getElementById('search').value = '';
  query = '';
  this.style.display = 'none';
  render();
});

render();
</script>
</body>
</html>
